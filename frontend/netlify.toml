# Netlify configuration for Royal Komputer storefront
# Base directory: frontend/

[build]
  publish = "."
  command = "echo 'Static PHP site — no build step required'"

# Proxy admin paths to Render backend
[[redirects]]
  from = "/admin/*"
  to = "https://royal-admin.onrender.com/:splat"
  status = 200

[[redirects]]
  from = "/login*"
  to = "https://royal-admin.onrender.com/login"
  status = 200

# Proxy API mutations to Render
[[redirects]]
  from = "/update_*"
  to = "https://royal-admin.onrender.com/:splat"
  status = 200

[[redirects]]
  from = "/api_manage_*"
  to = "https://royal-admin.onrender.com/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

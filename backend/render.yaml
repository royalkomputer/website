# Royal Komputer — Render Blueprint
# Deploys the backend/ directory as a Docker container
# Connected to Neon PostgreSQL for the cloud database
#
# How to deploy:
#   1. Create a Neon project at https://neon.tech
#   2. Copy the connection string
#   3. Connect this git repo to Render dashboard
#   4. Render auto-detects this blueprint (use path: backend/render.yaml)
#   5. Add Neon env vars in Render dashboard → Environment
#   6. Deploy

services:
  - type: web
    name: royal-backend
    runtime: docker
    plan: free

    # Monorepo: only deploy the backend/ subdirectory
    rootDir: backend

    # Health check — Render pings this every 5 minutes
    healthCheckPath: /index.php

    # ── Environment Variables ──
    envVars:
      # === NEON DATABASE (set in Render dashboard) ===
      # - key: PGHOST
      #   value: ep-xxxx.us-east-2.aws.neon.tech
      # - key: PGPORT
      #   value: "5432"
      # - key: PGDATABASE
      #   value: royal
      # - key: PGUSER
      #   value: royal_owner
      # - key: PGPASSWORD
      #   value: your-neon-password

      # App environment
      - key: APP_ENV
        value: production

# Royal Komputer — Render Blueprint
# Deploys the backend/ directory as a PHP web service
# Connected to Neon PostgreSQL for the cloud database
#
# How to deploy:
#   1. Create a Neon project at https://neon.tech
#   2. Copy the connection string
#   3. Connect this git repo to Render dashboard
#   4. Render auto-detects this blueprint
#   5. Add Neon env vars in Render dashboard → Environment (see envVars below)
#   6. Deploy

services:
  - type: web
    name: royal-backend
    env: php
    plan: free

    # Monorepo: only deploy the backend/ subdirectory
    rootDir: backend

    # No build step — vanilla PHP, no Composer
    buildCommand: ""

    # PHP built-in server
    # Serves all .php files directly, no router needed
    startCommand: php -S 0.0.0.0:$PORT

    # Health check — Render pings this every 5 minutes
    healthCheckPath: /index.php

    # ── Environment Variables ──
    envVars:
      # Render auto-injects $PORT

      # === NEON DATABASE (set in Render dashboard) ===
      # - key: PGHOST
      #   value: ep-xxxx.us-east-2.aws.neon.tech
      # - key: PGPORT
      #   value: "5432"
      # - key: PGDATABASE
      #   value: royal
      # - key: PGUSER
      #   value: royal_owner
      # - key: PGPASSWORD
      #   value: your-neon-password

      # App environment
      - key: APP_ENV
        value: production

    # ── Persistent Disk ──
    # For JSON config files (admins.json, jam_operasional.json, etc.)
    # Photos are stored in /opt/render/project/src/backend/uploads/
    # (ephemeral — survives restarts but resets on deploy)
    disk:
      name: backend-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
